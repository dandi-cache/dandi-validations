name: Update

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ secrets._GITHUB_API_KEY }}
  REPO_DIR: ${{ github.event.repository.name }}

jobs:
  CheckRunner:
    name: Pre-run Check
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github
          sparse-checkout-cone-mode: true
          fetch-depth: 1

      - name: Cancel if offline
        uses: ./.github/actions/check-runner
        with:
          org: dandi-cache/self-hosted-crons
          labels: engaging,dandi,validations
          token: ${{ secrets._GITHUB_API_KEY }}

  Update:
    needs: CheckRunner
    name: Update
    runs-on: [self-hosted, engaging, dandi, validations]
    timeout-minutes: 2880  # 48 hours

    steps:
      - name: Clone
        run: git clone -b main https://x-access-token:${{ secrets._GITHUB_API_KEY }}@github.com/dandi-cache/$REPO_DIR.git

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Run update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          pip install dandi

          python $REPO_DIR/code/update.py

      - name: Upload changes
        run: |
          git -C $REPO_DIR add .
          git -C $REPO_DIR commit --message "update" || true  # || true in case of no changes
          git -C $REPO_DIR push

  NotifyOnFailure:
    runs-on: ubuntu-latest
    needs: [ Update ]
    if: ${{ always() && failure() }}
    steps:
      - uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "CI Failure: DANDI Cache - DANDI Validations"
          to: cody.c.baker.phd@gmail.com  # Add more with comma separation (no spaces)
          from: DANDI Cache <dandi-cache@users.noreply.github.com>
          body: "Please check the latest run of the update: https://github.com/dandi-cache/${{ env.REPO_DIR }}/actions/workflows/update.yml"
